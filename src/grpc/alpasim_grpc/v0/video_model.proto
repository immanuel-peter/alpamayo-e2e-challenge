syntax = "proto3";

package omnidreams.video_model;

import "alpasim_grpc/v0/common.proto";
import "alpasim_grpc/v0/sensorsim.proto";

service WorldModelService {
    rpc start_session(SessionRequest) returns (SessionId);
    rpc close_session(SessionCloseRequest) returns (common.Empty);
    rpc render_video_chunk(VideoChunkRequest) returns (VideoChunkReturn);
    rpc get_version (common.Empty) returns (common.VersionId);
}
message StaticWorldMap {
    bytes hdmap_parquets = 1; // bytes of zip-compressed parquet files
}

message SessionId {
    string session_id = 1;
}

enum ActorClassId {
    INVALID = 0;
    // TODO: make sure the taxonomy makes sense w.r.t. the hdmap renderer.
    CAR = 1;
    TRUCK = 2;
    PEDESTRIAN = 3;
    CYCLIST = 4;
    OTHER = 5;
}

message DynamicActor {
    ActorClassId class_id = 1;
    common.AABB bbox_dims = 2;
    common.Trajectory trajectory = 3; // contains a time range
}

message DynamicWorldState {
    repeated DynamicActor actors = 1;
    // TODO: traffic light states, etc
}

enum ImageFormat {
    UNDEFINED = 0;
    PNG = 1;
    JPEG = 2;
    JPEG2000 = 3;
    RGB_UINT8_PLANAR = 4;
    AVC = 5;
    AV1 = 6;
}

message Image {
    bytes data = 1;
    ImageFormat format = 2;
}

// Text prompt for guiding video generation
message TextPrompt {
    string positive = 1;  // Positive prompt describing desired content
    string negative = 2;  // Negative prompt describing content to avoid
}

// Debug options for development and visualization
message DebugOptions {
    bool return_hdmap_frames = 1;  // Return rendered HD map condition frames
    bool skip_video_generation = 2;  // Skip video model inference, only render HDMap (fast exploration mode)
}

message SessionRequest {
    StaticWorldMap static_world_map = 1;
    TextPrompt text_prompt = 2;  // Optional text prompt for generation
    DebugOptions debug_options = 3;      // Optional debug output options
    repeated nre.grpc.protos.sensorsim.CameraSpec camera_specs = 4;  // One per view
    repeated Image initial_frames = 5;            // One conditioning frame per view
    repeated common.Pose rig_to_camera = 6; // Rig-to-camera extrinsics (one per view)
    fixed64 random_seed = 7;  // Optional random seed for deterministic generation (0 = server chooses)
}

message SessionCloseRequest {
    string session_id = 1;
}

message VideoChunkRequest {
    SessionId session_id = 1;
	common.Trajectory rig_trajectory = 2;  // Ego rig trajectory
    DynamicWorldState dynamic_state = 3; // within requested time range
}

// Per-camera output frames
message CameraOutput {
    string camera_logical_id = 1;
    repeated Image rgb_frames = 2;
    repeated Image hdmap_condition_frames = 3;
}

message VideoChunkReturn {
    // Per-camera output frames
    repeated CameraOutput camera_outputs = 1;
}
